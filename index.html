<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Vidoy Streaming</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      overflow-x:hidden;
    }

    header{
      width:100%;
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#111;
      position:fixed;
      top:0;
      z-index:1000;
    }

    .logo{
      font-size:28px;
      font-weight:700;
      color:#ff0000;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      transition:0.3s;
    }

    nav a:hover{
      color:#ff0000;
    }

    .hero{
      height:100vh;
      background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1974&auto=format&fit=crop') center/cover;
      display:flex;
      align-items:center;
      padding:80px;
      position:relative;
    }

    .hero::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      top:0;
      left:0;
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:600px;
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:18px;
      margin-bottom:30px;
      color:#ddd;
    }

    .btn{
      padding:14px 30px;
      background:#ff0000;
      border:none;
      border-radius:8px;
      color:white;
      cursor:pointer;
      transition:0.3s;
      font-size:16px;
    }

    .btn:hover{
      background:#cc0000;
    }

    .section{
      padding:80px 40px;
    }

    .section h2{
      font-size:32px;
      margin-bottom:30px;
    }

    .player{
      width:100%;
      height:700px;
      overflow:hidden;
      border-radius:20px;
      box-shadow:0 0 30px rgba(255,0,0,0.2);
    }

    .player iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .movies{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#181818;
      border-radius:15px;
      overflow:hidden;
      transition:0.3s;
      cursor:pointer;
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 0 20px rgba(255,0,0,0.4);
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
    }

    .card-content h3{
      margin-bottom:10px;
    }

    footer{
      background:#111;
      text-align:center;
      padding:30px;
      color:#aaa;
      margin-top:50px;
    }

    ::-webkit-scrollbar{
      width:10px;
    }

    ::-webkit-scrollbar-track{
      background:#111;
    }

    ::-webkit-scrollbar-thumb{
      background:#ff0000;
      border-radius:10px;
    }

    @media(max-width:768px){

      header{
        padding:20px;
      }

      nav{
        display:none;
      }

      .hero{
        padding:30px;
      }

      .hero h1{
        font-size:40px;
      }

      .player{
        height:250px;
      }

      .section{
        padding:60px 20px;
      }

    }

  </style>

</head>

<body>

  <header>

    <div class="logo">VIDOY STREAM</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Movies</a>
      <a href="#">Trending</a>
      <a href="#">Series</a>
    </nav>

  </header>

  <section class="hero">

    <div class="hero-content">

      <h1>Unlimited Streaming</h1>

      <p>
        Nikmati streaming modern kualitas HD langsung dari Vidoy.
      </p>

      <button class="btn" onclick="scrollToPlayer()">
        Watch Now
      </button>

    </div>

  </section>

  <section class="section">

    <h2>Streaming Player</h2>

    <div class="player">

      <iframe
      src="LINK_EMBED_VIDOY"
      allowfullscreen>
      </iframe>

    </div>

  </section>

  <section class="section">

    <h2>Popular Movies</h2>

    <div class="movies">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1974&auto=format&fit=crop">

        <div class="card-content">
          <h3>Movie One</h3>
          <p>Action & Adventure</p>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=1974&auto=format&fit=crop">

        <div class="card-content">
          <h3>Movie Two</h3>
          <p>Drama & Thriller</p>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1518929458119-e5bf444c30f4?q=80&w=1974&auto=format&fit=crop">

        <div class="card-content">
          <h3>Movie Three</h3>
          <p>Sci-Fi & Fantasy</p>
        </div>
      </div>

    </div>

  </section>

  <footer>
    © 2026 Vidoy Streaming. All Rights Reserved.
  </footer>

  <script>

    function scrollToPlayer(){

      document.querySelector('.player').scrollIntoView({

        behavior:'smooth'

      });

    }

  </script>

</body>
</html>
